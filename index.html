<style>
:root {

.dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --text-muted: #94a3b8; --border: #334155; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

.nav-right { display: flex; align-items: center; gap: 8px; }

.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--primary-light); border-color: var(--primary); }
.btn-danger { background: linear-gradient(135deg,#ef4444,#dc2626); color: white; }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn-xs { padding: 4px 8px; font-size: 12px; }
.container { max-width: 1200px; margin: 24px auto; padding: 0 24px; animation: fadeIn 0.3s ease; }

.card { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 20px; transition: var(--transition); }

.badge-warning { background: #fef3c7; color: #92400e; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--bg); color: var(--text); transition: var(--transition); outline: none; font-family: inherit; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
.form-group { margin-bottom: 14px; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 200; }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 16px; padding: 28px; max-width: 700px; width: 95%; max-height: 85vh; overflow-y: auto; animation: fadeIn 0.2s ease; }
.close-btn { position: absolute; top: 16px; right: 16px; border: none; background: none; font-size: 20px; cursor: pointer; color: var(--text-muted); }

        /* ==== v3 Premium Enhancements ==== */

        .company-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
        .company-rating { display: flex; align-items: center; gap: 4px; }

</style>

// ========== AUTH ==========
function curUser(){const e=get(DB.curr);return e?get(DB.users).find(u=>u.email===e):null;}
function curRole(){return curUser()?.role;}

// ========== NAV ==========
function buildNav(){
    var r=curRole();
    var html=r==='hr'?
        '<div class="nav-item active" data-page="hr-jobs">职位</div><div class="nav-item" data-page="hr-talent">人才库</div><div class="nav-item" data-page="hr-messages">消息</div><div class="nav-item" data-page="hr-dashboard">看板</div><div class="nav-item" data-page="hr-settings">设置</div>':
        r==='jobseeker'?
        '<div class="nav-item active" data-page="js-jobs">找工作</div><div class="nav-item" data-page="js-companies">公司</div><div class="nav-item" data-page="js-community">社区</div><div class="nav-item" data-page="js-tools">工具</div><div class="nav-item" data-page="js-profile">我的</div>':
        '<div class="nav-item active" data-page="js-jobs">找工作</div><div class="nav-item" data-page="js-companies">公司</div>';
    document.getElementById('navLinks').innerHTML=html;
    document.querySelectorAll('.nav-item').forEach(n=>n.onclick=function(){
        var p=n.dataset.page;
        if(!curUser()&&(p.includes('hr')||p==='js-profile'||p==='js-tools')){toast('请先登录');showLogin();return;}
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
        n.classList.add('active');renderPage(p);
    });
    updateAuthUI();
}
function updateAuthUI(){
    var u=curUser();
    var ncount=u?(get(DB.notifs)[u.email]||[]).length:0;
    document.getElementById('authArea').innerHTML=u?
        '<span onclick="showNotifs()" style="cursor:pointer;font-size:18px">'+String.fromCharCode(128276)+' '+(ncount?'<span style="background:var(--danger);color:white;border-radius:50%;padding:0 6px;font-size:11px;">'+ncount+'</span>':'')+'</span>'+
        '<span style="font-size:13px;color:var(--text-muted)">'+u.name+'</span>'+
        '<button class="btn btn-sm btn-outline" onclick="logout()">退出</button>'+
        '<button class="btn btn-sm btn-outline" onclick="toggleDark()" title="暗色模式">'+String.fromCharCode(127763)+'</button>'+
        '<button class="btn btn-sm btn-outline" onclick="if(confirm(\'重置所有数据？\')){Object.values(DB).forEach(function(k){localStorage.removeItem(k)});location.reload();}" title="重置">'+String.fromCharCode(9851)+'</button>'

}
function toggleDark(){document.body.classList.toggle('dark');}

function renderPage(p){
    var pages={'js-jobs':renderJSJobs,'js-companies':renderCompanies,'js-community':renderCommunity,'js-tools':renderTools,'js-profile':renderProfile,'hr-jobs':renderHRJobs,'hr-talent':renderHRTalent,'hr-messages':renderHRMessages,'hr-dashboard':renderHRDashboard,'hr-settings':renderHRSettings};
    if(pages[p]) pages[p]();
}

function renderJSJobs(){
    document.getElementById('pageContainer').innerHTML=
    '<div class="card"><h2 style="margin-bottom:16px;">发现理想职位</h2>'+
    '<div style="display:flex;gap:12px;margin-bottom:16px;">'+
    '<div class="form-group" style="flex:2;margin:0"><input id="kw" placeholder="职位/技能"></div>'+
    '<div class="form-group" style="flex:1;margin:0"><input id="loc" placeholder="城市"></div>'+
    '<button class="btn btn-primary" onclick="searchJobs()">搜索</button></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;">'+
    '<button class="btn btn-outline btn-sm" onclick="renderJobs(get(DB.jobs).filter(function(j){return j.urgent}))">急聘</button>'+
    '<button class="btn btn-outline btn-sm" onclick="renderJobs(get(DB.jobs).filter(function(j){return j.location.includes(\'上海\')}))">上海</button>'+
    '<button class="btn btn-outline btn-sm" onclick="requireLogin(aiRecommend)">AI推荐</button>'+
    '<button class="btn btn-outline btn-sm" onclick="requireLogin(openCompare)">对比</button></div></div>'+
    '<div id="jobList" class="job-list"></div>';
    renderJobs(get(DB.jobs));
}
function renderJobs(jobs){
    var c=document.getElementById('jobList');if(!c)return;
    var favs=curUser()?(get(DB.favs)[curUser().email]||[]):[];
    var blocked=curUser()?(get(DB.blocked)[curUser().email]||[]):[];
    var filtered=jobs.filter(function(j){return !blocked.includes(j.companyId);});
    c.innerHTML=filtered.length?filtered.map(function(j){
        var comp=get(DB.companies).find(function(cc){return cc.id===j.companyId;})||{name:'未知'};
        return '<div class="job-item"><div style="flex:1;"><h3>'+j.title+' '+(j.urgent?'<span class="badge badge-danger">急聘</span>':'')+'</h3>'+
        '<div style="color:var(--text-muted);font-size:13px;margin-top:4px;">'+comp.name+' | '+j.location+' | '+j.salary+' | '+j.tags.split(',').map(function(t){return '<span class="badge badge-success">'+t+'</span>';}).join(' ')+'</div>'+
        '<div style="font-size:13px;color:var(--text-muted);margin-top:6px;">'+j.desc+'</div></div>'+
        '<div style="display:flex;gap:8px;flex-shrink:0;">'+
        '<button class="btn btn-sm btn-outline" onclick="toggleFav('+j.id+')">'+(favs.includes(j.id)?'★':'☆')+'</button>'+
        '<button class="btn btn-sm btn-outline" onclick="requireLogin(function(){openChat(\''+j.title+'\')})">💬</button>'+
        '<button class="btn btn-sm btn-primary" onclick="requireLogin(function(){applyJob(\''+j.title+'\')})">投递</button>'+
        '<button class="btn btn-sm btn-outline" onclick="blockCompany('+j.companyId+')">🚫</button></div></div>';
    }).join(''):'<div class="card" style="text-align:center;padding:40px;color:var(--text-muted)"><h3>📭 暂无匹配职位</h3><p>试试其他搜索条件</p></div>';
}
function searchJobs(){
    var kw=document.getElementById('kw').value.toLowerCase();
    var loc=document.getElementById('loc').value.toLowerCase();
    var jobs=get(DB.jobs);
    if(kw) jobs=jobs.filter(function(j){return j.title.toLowerCase().includes(kw)||j.tags.toLowerCase().includes(kw);});
    if(loc) jobs=jobs.filter(function(j){return j.location.toLowerCase().includes(loc);});
    renderJobs(jobs);
}
function toggleFav(id){
    var email=curUser().email;var favs=get(DB.favs);
    if(!favs[email]) favs[email]=[];
    var idx=favs[email].indexOf(id);idx>-1?favs[email].splice(idx,1):favs[email].push(id);
    set(DB.favs,favs);renderJobs(get(DB.jobs));
}
function applyJob(title){
    var email=curUser().email;
    get(DB.apps).push({email:email,jobTitle:title,time:new Date().toLocaleString(),status:'待查看'});
    set(DB.apps,get(DB.apps));
    var cands=get(DB.cands);if(!cands[title]) cands[title]=[];
    var r=get(DB.resumes)[email]||{};
    cands[title].push({name:r.name||email.split('@')[0],years:2,edu:r.education||'本科',keywords:r.skills||'',resume:r.experience||'',score:60,status:'待查看'});
    set(DB.cands,cands);toast('投递成功');
}
function blockCompany(cid){
    var email=curUser().email;var b=get(DB.blocked);if(!b[email]) b[email]=[];
    if(!b[email].includes(cid)){b[email].push(cid);set(DB.blocked,b);toast('已屏蔽');}
    renderJobs(get(DB.jobs));
}
function aiRecommend(){
    var email=curUser().email;var skills=(get(DB.resumes)[email]?.skills||'').toLowerCase().split(/[,\s]+/).filter(Boolean);
    if(!skills.length) return toast('请先在"我的"中填写技能');
    var jobs=get(DB.jobs).map(function(j){return Object.assign({},j,{match:skills.filter(function(s){return j.tags.toLowerCase().includes(s);}).length});}).sort(function(a,b){return b.match-a.match;}).slice(0,5);
    renderJobs(jobs);
}
function openCompare(){
    var jobs=get(DB.jobs);
    showModal('职位对比 (勾选2-4个)','<div style="margin:12px 0">'+jobs.map(function(j){return '<label style="display:block;margin:6px 0"><input type="checkbox" class="cmp" value="'+j.id+'"> '+j.title+' - '+j.salary+'</label>';}).join('')+'</div><button class="btn btn-primary" onclick="showCompareResult()">对比</button>');
}
function showCompareResult(){
    var checks=document.querySelectorAll('.cmp:checked');
    if(checks.length<2) return toast('至少选2个');
    var ids=Array.from(checks).map(function(c){return parseInt(c.value);});
    var jobs=get(DB.jobs).filter(function(j){return ids.includes(j.id);});
    var html='<table><tr><th></th>'+jobs.map(function(j){return '<th>'+j.title+'</th>';}).join('')+'</tr>';
    ['location','salary','type','companyId'].forEach(function(k){
        html+='<tr><td><strong>'+k+'</strong></td>'+jobs.map(function(j){
            if(k==='companyId'){var c=get(DB.companies).find(function(cc){return cc.id===j.companyId;});return'<td>'+(c?c.name:'-')+'</td>';}
            return '<td>'+j[k]+'</td>';
        }).join('')+'</tr>';
    });
    html+='</table>';showModal('对比结果',html);
}
function renderCompanies(){
    var comps=get(DB.companies);
    document.getElementById('pageContainer').innerHTML='<div class="card"><h2>公司库</h2></div>'+comps.map(function(c){
        return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;"><div><h3>'+c.name+'</h3><div style="color:var(--text-muted);font-size:14px;">'+c.industry+' | '+c.size+' | 成立于 '+c.founded+'</div><div style="margin-top:4px;">'+c.desc+'</div></div><div style="text-align:right;"><div style="font-size:24px;font-weight:700;">'+Array(Math.round(c.score)).fill('★').join('')+'</div><div style="color:var(--text-muted)">'+c.score+'</div></div></div></div>';
    }).join('');
}
function renderCommunity(){

function openNewPost(){showModal('发帖','<div class="form-group"><input id="postTitle" placeholder="标题"></div><div class="form-group"><textarea id="postContent" placeholder="内容" rows="4"></textarea></div><button class="btn btn-primary" onclick="submitPost()">发布</button>');}
function submitPost(){
    var posts=get(DB.forum);
    posts.push({title:document.getElementById('postTitle').value,content:document.getElementById('postContent').value,author:curUser().name,replies:[]});

function viewPost(i){
    var p=get(DB.forum)[i];

}
function addReply(i){var text=document.getElementById('replyText').value;var posts=get(DB.forum);posts[i].replies.push({author:curUser().name,text:text});set(DB.forum,posts);closeModal();renderCommunity();}

function smartParseResume(){
    var e=curUser().email;var r=get(DB.resumes)[e]||{};
    var text=[r.name,r.skills,r.experience||''].join(' ');
    if(!text.trim())return toast('请先填写简历信息');
    var nameMatch=text.match(/姓名[：:]\s*(\S+)/i)||text.match(/^([^\s]{2,4})\n/m);
    var skills=text.match(/(Python|Java|JavaScript|React|Vue|SQL|Docker|AWS|AI|ML|数据分析|产品设计|项目管理|运营|市场|Node\.js|TypeScript|Go|Rust|Kubernetes|Linux|Git)/gi)||[];
    var eduMatch=text.match(/(本科|硕士|博士|专科|MBA|学士|研究生)/i);
    var expMatch=text.match(/(\d+)\s*年/i);
    var parsed={
        name:nameMatch?nameMatch[1]:'未识别',
        skills:[...new Set(skills)],
        education:eduMatch?eduMatch[1]:'未识别',
        experience:expMatch?expMatch[1]+'年':'未识别',
        score:Math.min(30+(new Set(skills)).size*5,95)
    };
    showModal('AI智能解析',
    '<div class="card"><p><strong>姓名:</strong> '+parsed.name+'</p>'+
    '<p><strong>学历:</strong> '+parsed.education+'</p>'+
    '<p><strong>经验:</strong> '+parsed.experience+'</p>'+
    '<p><strong>技能:</strong> '+parsed.skills.map(function(s){return '<span class="badge badge-success">'+s+'</span>';}).join(' ')+'</p>'+
    '<p><strong>预估匹配度:</strong> <span style="font-size:24px;font-weight:700;color:var(--primary)">'+parsed.score+'/100</span></p>'+
    '<button class="btn btn-primary" onclick="applyParsed()">应用到简历</button></div>');
    window._parsed=parsed;
}
function applyParsed(){
    var p=window._parsed;if(!p)return;
    var e=curUser().email;var r=get(DB.resumes);if(!r[e])r[e]={};
    if(p.name!=='未识别')r[e].name=p.name;
    if(p.skills.length)r[e].skills=p.skills.join(',');
    if(p.education!=='未识别')r[e].education=p.education;
    set(DB.resumes,r);closeModal();loadProfileTab('resume');toast('已应用!');
}
function smartScore(title,name){
    var job=get(DB.jobs).find(function(j){return j.title===title;});
    if(!job)return;var cands=get(DB.cands);
    var c=cands[title].find(function(i){return i.name===name;});if(!c)return;
    var jkw=(job.tags||'').toLowerCase().split(/[,\s]+/).filter(Boolean);
    var ckw=(c.keywords||c.resume||'').toLowerCase();
    var score=0;
    jkw.forEach(function(k){if(ckw.includes(k))score+=Math.floor(100/jkw.length);});
    score+=(ckw.includes('年')?15:5);
    c.score=Math.min(score+30,98);
    set(DB.cands,cands);updCandTable(title);
    toast(c.name+' 智能评分: '+c.score+'/100');
}
function renderKanban(title){
    var cands=get(DB.cands)[title]||[];
    var stages={'待查看':[],'通过':[],'面试邀请':[],'已面试':[],'录用':[],'拒绝':[]};
    cands.forEach(function(c){var s=stages[c.status]?c.status:'待查看';stages[s].push(c);});
    var html='<div style="display:flex;gap:12px;overflow-x:auto;padding:10px;">';
    Object.keys(stages).forEach(function(stage){
        var items=stages[stage];
        html+='<div class="kanban-col" data-stage="'+stage+'" style="min-width:180px;"><h4 style="margin-bottom:8px;">'+stage+' ('+items.length+')</h4>';
        items.forEach(function(c){
            html+='<div class="kanban-card" draggable="true" data-name="'+c.name+'" data-title="'+title+'">'+c.name+' <span style="color:var(--primary)">'+c.score+'</span></div>';
        });
        html+='</div>';
    });
    html+='</div><small style="color:var(--text-muted)">拖拽卡片到不同阶段更新状态</small>';
    showModal(title+' - 招聘看板',html);
    setTimeout(function(){
        document.querySelectorAll('.kanban-card').forEach(function(el){
            el.addEventListener('dragstart',function(e){e.dataTransfer.setData('text/plain',JSON.stringify({name:el.dataset.name,title:el.dataset.title}));});
        });
        document.querySelectorAll('.kanban-col').forEach(function(col){
            col.addEventListener('dragover',function(e){e.preventDefault();});
            col.addEventListener('drop',function(e){
                e.preventDefault();var data=JSON.parse(e.dataTransfer.getData('text/plain'));
                var stage=col.dataset.stage;var cands=get(DB.cands);
                if(cands[data.title]){var c=cands[data.title].find(function(i){return i.name===data.name;});if(c){c.status=stage;set(DB.cands,cands);}}
                toast(data.name+' → '+stage);
                updCandTable(data.title);setTimeout(function(){renderKanban(data.title);},100);
            });
        });
    },500);
}

function exportCSV(title){

    var blob=new Blob(['\uFEFF姓名,分数,状态,学历,技能,年限\n'+rows],{type:'text/csv;charset=utf-8'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=title+'_候选人_'+new Date().toISOString().split('T')[0]+'.csv';a.click();toast('导出成功');

function advancedTalentSearch(){
    showModal('高级人才搜索',
    '<div class="form-group"><input id="atsKeyword" placeholder="技能关键词（逗号分隔）"></div>'+
    '<div class="form-group"><input id="atsExp" type="number" placeholder="最低工作年限" min="0"></div>'+
    '<div class="form-group"><select id="atsEdu"><option value="">学历不限</option><option>本科</option><option>硕士</option><option>博士</option></select></div>'+
    '<button class="btn btn-primary" onclick="runATSearch()">搜索</button><div id="atsResult" style="margin-top:12px;max-height:300px;overflow-y:auto;"></div>');
}
function runATSearch(){
    var kw=(document.getElementById('atsKeyword').value||'').toLowerCase().split(/[,\s]+/).filter(Boolean);
    var exp=parseInt(document.getElementById('atsExp').value)||0;
    var edu=document.getElementById('atsEdu').value;
    var all={};
    Object.entries(get(DB.cands)).forEach(function(entry){
        entry[1].forEach(function(c){
            if(!all[c.name]){
                var text=(c.keywords+' '+c.resume+' '+c.edu).toLowerCase();
                var match=!kw.length;
                if(kw.length)match=kw.every(function(k){return text.includes(k);});
                if(match&&exp&&c.years<exp)match=false;
                if(match&&edu&&!text.includes(edu))match=false;
                if(match)all[c.name]=Object.assign({},c,{jobTitle:entry[0]});
            }
        });
    });
    var result=Object.values(all);
    document.getElementById('atsResult').innerHTML=result.length?
    result.map(function(c){return '<div class="job-item"><div><strong>'+c.name+'</strong> - '+c.jobTitle+'<br><small>'+c.years+'年 | '+c.edu+' | '+c.keywords+'</small></div><div><span style="font-weight:700;color:var(--primary)">'+c.score+'分</span></div></div>';}).join(''):
    '<p style="text-align:center;padding:20px;color:var(--text-muted)">未找到匹配人才</p>';
}

function sendChat(){
    var text=document.getElementById('chatInput').value.trim();if(!text)return;
    var chats=get(DB.chats);if(!chats[currentChatKey])chats[currentChatKey]=[];
    chats[currentChatKey].push({sender:curUser().name,text:text,time:new Date().toLocaleTimeString()});
    set(DB.chats,chats);openChat(currentChatKey.split('_')[1]);
}

function login(){
    var email=document.getElementById('loginEmail').value.trim();
    var pwd=document.getElementById('loginPassword').value;
    var user=get(DB.users).find(function(u){return u.email===email&&u.password===pwd;});
    if(!user)return toast('邮箱或密码错误');
    set(DB.curr,email);closeModal();buildNav();renderPage(user.role==='hr'?'hr-jobs':'js-jobs');toast('欢迎回来, '+user.name);
}
function register(){
    var email=document.getElementById('regEmail').value.trim();
    var pwd=document.getElementById('regPassword').value;
    if(pwd!==document.getElementById('regConfirm').value)return toast('密码不一致');
    var role=document.getElementById('regRole').value;
    var users=get(DB.users);if(users.find(function(u){return u.email===email;}))return toast('邮箱已注册');
    users.push({email:email,password:pwd,role:role,name:email.split('@')[0]});
    set(DB.users,users);set(DB.curr,email);
    closeModal();buildNav();renderPage(role==='hr'?'hr-jobs':'js-jobs');toast('注册成功');
}
